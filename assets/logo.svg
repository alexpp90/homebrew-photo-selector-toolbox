<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Ring (Camera Lens Outer Barrel) with solid background -->
  <circle cx="256" cy="256" r="230" fill="#18181b" stroke="#27272a" stroke-width="8" />
  
  <!-- Realistic Retro Focus Ring Grip Serrations (Knurled focus ring teeth) -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="#3f3f46" stroke-width="16" stroke-dasharray="6, 6" />
  
  <!-- Outer Lens Ring -->
  <circle cx="256" cy="256" r="160" fill="#0f172a" stroke="#f59e0b" stroke-width="6" />

  <!-- Camera Aperture blades interlocking design in Golden Hour colors -->
  <g id="aperture-blades">
    <path d="M 227,206 L 380,206 L 370,75 L 160,90 Z" fill="#f97316" stroke="#0f172a" stroke-width="3" />
    <path d="M 227,206 L 380,206 L 370,75 L 160,90 Z" fill="#f59e0b" stroke="#0f172a" stroke-width="3" transform="rotate(60 256 256)" />
    <path d="M 227,206 L 380,206 L 370,75 L 160,90 Z" fill="#f97316" stroke="#0f172a" stroke-width="3" transform="rotate(120 256 256)" />
    <path d="M 227,206 L 380,206 L 370,75 L 160,90 Z" fill="#f59e0b" stroke="#0f172a" stroke-width="3" transform="rotate(180 256 256)" />
    <path d="M 227,206 L 380,206 L 370,75 L 160,90 Z" fill="#f97316" stroke="#0f172a" stroke-width="3" transform="rotate(240 256 256)" />
    <path d="M 227,206 L 380,206 L 370,75 L 160,90 Z" fill="#f59e0b" stroke="#0f172a" stroke-width="3" transform="rotate(300 256 256)" />
  </g>
</svg>
