<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <!-- Dark base background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e24" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Vibrant blue to cyan gradient for primary elements -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Translucent overlay gradient -->
    <linearGradient id="overlayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Accent violet gradient -->
    <linearGradient id="accentGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Ring (Camera Lens Outer Barrel) with subtle gradient -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGrad)" stroke="#27272a" stroke-width="8" />
  
  <!-- Outer glowing accent arc -->
  <path d="M 256,26 A 230,230 0 0,1 486,256" stroke="url(#primaryGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <path d="M 256,486 A 230,230 0 0,1 26,256" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Camera Aperture blades / Shutter design inside -->
  <!-- Outer Lens Ring -->
  <circle cx="256" cy="256" r="160" fill="#18181b" stroke="url(#primaryGrad)" stroke-width="6" />

  <!-- Histogram / Analytics Bars growing from the bottom inside of the lens, styled with glowing rounded rectangles -->
  <!-- Bar 1 (Left, Cyan/Blue) -->
  <rect x="180" y="260" width="24" height="80" rx="12" fill="url(#primaryGrad)" opacity="0.75" />
  <!-- Bar 2 (Middle, Indigo/Cyan) -->
  <rect x="216" y="190" width="24" height="150" rx="12" fill="url(#primaryGrad)" />
  <!-- Bar 3 (Right, Purple/Indigo) -->
  <rect x="252" y="150" width="24" height="190" rx="12" fill="url(#accentGrad)" />
  <!-- Bar 4 (Far Right, Red/Orange/Pink) -->
  <rect x="288" y="210" width="24" height="130" rx="12" fill="url(#primaryGrad)" opacity="0.85" />
  <!-- Bar 5 (Deep Right) -->
  <rect x="324" y="270" width="24" height="70" rx="12" fill="url(#primaryGrad)" opacity="0.6" />

  <!-- Camera Lens Reflection / Gloss effect -->
  <path d="M 120,130 A 140,140 0 0,1 360,130" fill="none" stroke="url(#overlayGrad)" stroke-width="40" stroke-linecap="round" opacity="0.5"/>
  <circle cx="160" cy="160" r="15" fill="#ffffff" opacity="0.2" />
  <circle cx="180" cy="180" r="8" fill="#ffffff" opacity="0.1" />

  <!-- Decorative crosshair or focal point lines for "Focus" concept -->
  <path d="M 256,40 L 256,70" stroke="#3f3f46" stroke-width="4" stroke-linecap="round" />
  <path d="M 256,442 L 256,472" stroke="#3f3f46" stroke-width="4" stroke-linecap="round" />
  <path d="M 40,256 L 70,256" stroke="#3f3f46" stroke-width="4" stroke-linecap="round" />
  <path d="M 442,256 L 472,256" stroke="#3f3f46" stroke-width="4" stroke-linecap="round" />
</svg>
