name: Desktop CI

# Single pipeline for the Python/Tkinter desktop solution: lint + tests always
# run; the 3-OS PyInstaller builds, GitHub release, and Homebrew tap update
# only happen on pushes to main or v* tags (and manual dispatch). Builds
# depend on tests via `needs:` — no cross-workflow polling gate needed.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.flake8'
      - '*.spec'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.flake8'
      - '*.spec'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  # Only cancel superseded PR runs; never abort an in-flight main/tag run
  # that may already be publishing a release or updating the Homebrew tap.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  # ── Fast lint gate (< 30s) ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 src/ tests/ --count --show-source --statistics

  # ── Unit & integration tests ────────────────────────────────────
  test:
    name: Tests on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            architecture: x64
          - os: macos-latest
            python-version: "3.12"
            architecture: arm64
          - os: windows-latest
            python-version: "3.12"
            architecture: x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libcairo2-dev xvfb scrot

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Start Xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1

      - name: Run tests (excluding visual)
        run: >-
          poetry run pytest
          --tb=short -q
          --junitxml=test-results.xml
          --cov=photo_selector_toolbox
          --cov-report=xml
          --cov-fail-under=60
          -m "not visual"
        env:
          DISPLAY: ${{ runner.os == 'Linux' && ':99' || '' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results.xml
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml
          if-no-files-found: ignore

  # ── Visual regression tests (Linux only, real Xvfb rendering) ───
  visual:
    name: Visual regression tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libcairo2-dev xvfb scrot

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-3.12-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-3.12-

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1

      - name: Run visual tests
        run: >-
          poetry run pytest
          tests/visual/
          --tb=short -q
          -m visual
        env:
          DISPLAY: ':99'

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-diffs
          path: tests/visual/diffs/
          if-no-files-found: ignore

  # ── PyInstaller builds (main / tags / manual dispatch only) ─────
  build:
    name: Build on ${{ matrix.os }}
    needs: [test, visual]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            architecture: x64
            artifact_name: photo-selector-toolbox-linux-x64
          - os: macos-latest
            architecture: arm64
            artifact_name: photo-selector-toolbox-macos-apple-silicon
          - os: windows-latest
            architecture: x64
            artifact_name: photo-selector-toolbox-windows-x64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        architecture: ${{ matrix.architecture }}

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk libcairo2-dev

    - name: Install Poetry
      run: |
        pip install poetry
        poetry config virtualenvs.create true
        poetry config virtualenvs.in-project true

    # Same cache key as the test jobs so builds reuse their warm venv cache.
    - name: Cache Poetry venv
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-poetry-3.12-${{ hashFiles('poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-3.12-

    - name: Install dependencies
      run: poetry install --no-interaction --no-root

    - name: Build Executables
      run: poetry run python scripts/build.py

    - name: Create Archive (Unix)
      if: runner.os != 'Windows'
      run: |
        cd dist
        zip -r -y ../${{ matrix.artifact_name }}.zip .

    - name: Create Archive (Windows)
      if: runner.os == 'Windows'
      run: |
        python -c "import shutil; shutil.make_archive('${{ matrix.artifact_name }}', 'zip', 'dist')"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.zip
        if-no-files-found: error

  release:
    name: Update Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display Downloaded Artifacts
        run: ls -R artifacts

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || 'Nightly Build' }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: artifacts/*.zip
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}

  update-homebrew-taps:
    name: Update Homebrew Taps
    needs: release
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download release artifacts
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG_DIR="nightly"
          else
            TAG_DIR="${{ github.ref_name }}"
          fi
          curl -L -o macos.zip "https://github.com/alexpp90/homebrew-photo-selector-toolbox/releases/download/${TAG_DIR}/photo-selector-toolbox-macos-apple-silicon.zip"
          curl -L -o linux.zip "https://github.com/alexpp90/homebrew-photo-selector-toolbox/releases/download/${TAG_DIR}/photo-selector-toolbox-linux-x64.zip"

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "macos_sha256=$(shasum -a 256 macos.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_sha256=$(shasum -a 256 linux.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          update_and_push() {
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              python3 scripts/update_formula.py \
                --file Casks/photo-selector-toolbox@nightly.rb \
                --macos-sha256 "${{ steps.hashes.outputs.macos_sha256 }}"

              python3 scripts/update_formula.py \
                --file Formula/photo-selector-toolbox@nightly.rb \
                --macos-sha256 "${{ steps.hashes.outputs.macos_sha256 }}" \
                --linux-sha256 "${{ steps.hashes.outputs.linux_sha256 }}"

              git add Casks/photo-selector-toolbox@nightly.rb Formula/photo-selector-toolbox@nightly.rb
              COMMIT_MSG="Update nightly Homebrew SHA256 hashes"
            else
              TAG_NAME="${{ github.ref_name }}"
              VERSION="${TAG_NAME#v}"

              python3 scripts/update_formula.py \
                --file Casks/photo-selector-toolbox.rb \
                --version-val "${VERSION}" \
                --macos-sha256 "${{ steps.hashes.outputs.macos_sha256 }}"

              python3 scripts/update_formula.py \
                --file Formula/photo-selector-toolbox.rb \
                --version-val "${VERSION}" \
                --macos-sha256 "${{ steps.hashes.outputs.macos_sha256 }}" \
                --linux-sha256 "${{ steps.hashes.outputs.linux_sha256 }}"

              git add Casks/photo-selector-toolbox.rb Formula/photo-selector-toolbox.rb
              COMMIT_MSG="Update stable Homebrew files to version ${VERSION}"
            fi

            git diff --cached --quiet || git commit -m "${COMMIT_MSG}"
            git push origin main
          }

          for i in {1..5}; do
            if update_and_push; then
              echo "Homebrew files updated and pushed successfully."
              exit 0
            fi
            echo "Attempt $i failed. Retrying in 2 seconds..."
            sleep 2
          done

          echo "Failed to update and push Homebrew files after 5 attempts."
          exit 1
        shell: bash
