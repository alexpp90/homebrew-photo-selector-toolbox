name: Build Executables

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            architecture: x64
            artifact_name: photo-selector-toolbox-linux-x64
          - os: macos-latest
            architecture: arm64
            artifact_name: photo-selector-toolbox-macos-apple-silicon
          - os: windows-latest
            architecture: x64
            artifact_name: photo-selector-toolbox-windows-x64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        architecture: ${{ matrix.architecture }}

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk libcairo2-dev

    - name: Install Poetry
      run: |
        pip install poetry
        poetry config virtualenvs.create true
        poetry config virtualenvs.in-project true

    - name: Install dependencies
      run: poetry install --no-interaction --no-root

    - name: Build Executables
      run: poetry run python scripts/build.py

    - name: Create Archive (Unix)
      if: runner.os != 'Windows'
      run: |
        cd dist
        zip -r -y ../${{ matrix.artifact_name }}.zip .

    - name: Create Archive (Windows)
      if: runner.os == 'Windows'
      run: |
        # Create a zip archive of the dist directory
        # shutil.make_archive adds the .zip extension automatically
        python -c "import shutil; shutil.make_archive('${{ matrix.artifact_name }}', 'zip', 'dist')"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.zip
        if-no-files-found: error

  release:
    name: Update Release
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display Downloaded Artifacts
        run: ls -R artifacts

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || 'Nightly Build' }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: artifacts/*.zip
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}

  update-homebrew-cask:
    name: Update Homebrew Cask
    needs: release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download macOS artifact
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            curl -L -o macos.zip \
              "https://github.com/alexpp90/homebrew-photo-selector-toolbox/releases/download/nightly/photo-selector-toolbox-macos-apple-silicon.zip"
          else
            curl -L -o macos.zip \
              "https://github.com/alexpp90/homebrew-photo-selector-toolbox/releases/download/${{ github.ref_name }}/photo-selector-toolbox-macos-apple-silicon.zip"
          fi

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 macos.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Cask File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          update_and_push() {
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              # Nightly Cask Update
              sed -i "s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.sha256 }}\"/" Casks/photo-selector-toolbox@nightly.rb
              git add Casks/photo-selector-toolbox@nightly.rb
              COMMIT_MSG="Update nightly Cask SHA256"
            else
              # Stable Cask Update
              TAG_NAME="${{ github.ref_name }}"
              VERSION="${TAG_NAME#v}"
              sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/photo-selector-toolbox.rb
              sed -i "s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.sha256 }}\"/" Casks/photo-selector-toolbox.rb
              git add Casks/photo-selector-toolbox.rb
              COMMIT_MSG="Update stable Cask to version ${VERSION}"
            fi
            
            git diff --cached --quiet || git commit -m "${COMMIT_MSG}"
            git push origin main
          }
          
          for i in {1..5}; do
            if update_and_push; then
              echo "Cask updated and pushed successfully."
              exit 0
            fi
            echo "Attempt $i failed. Retrying in 2 seconds..."
            sleep 2
          done
          
          echo "Failed to update and push Cask after 5 attempts."
          exit 1
