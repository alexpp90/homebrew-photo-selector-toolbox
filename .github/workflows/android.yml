name: Android CI

# Single pipeline for the Android solutions: tests always run; packaging,
# signing, and publishing only happen on pushes to main or v* tags (and
# manual dispatch). Builds depend on tests via `needs:` — no cross-workflow
# polling gate needed.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  # Only cancel superseded PR runs; never abort an in-flight main/tag run
  # that may already be publishing to Play or Firebase.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  # ── Module change detection ──────────────────────────────────────
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      toolbox: ${{ steps.filter.outputs.toolbox }}
      phototok: ${{ steps.filter.outputs.phototok }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            toolbox:
              - 'android/app/**'
              - 'android/build.gradle.kts'
              - 'android/settings.gradle.kts'
              - 'android/gradle.properties'
              - 'android/gradle/**'
              - '.github/workflows/android.yml'
            phototok:
              - 'android/phototok/**'
              - 'android/build.gradle.kts'
              - 'android/settings.gradle.kts'
              - 'android/gradle.properties'
              - 'android/gradle/**'
              - '.github/workflows/android.yml'

  # ── JVM unit tests (no emulator needed) ─────────────────────────
  unit-tests:
    name: Unit tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # setup-gradle handles Gradle caching (writes on main, read-only on
      # branches) — no separate actions/cache step needed.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            android/app/build/reports/tests/testDebugUnitTest/
            android/phototok/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

  # ── Android Lint (advisory for now — tighten once baseline is clean) ──
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        working-directory: android
        run: ./gradlew :app:lintDebug :phototok:lintDebug --continue --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            android/app/build/reports/lint-results-debug.html
            android/phototok/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # ── Instrumented tests on Android emulator ──────────────────────
  instrumented-tests:
    name: Instrumented tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [30]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 60
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          disable-snapshot: true
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics -camera-back none
          working-directory: android
          script: |
            ./gradlew :app:connectedDebugAndroidTest :phototok:connectedDebugAndroidTest --stacktrace
            killall -9 crashpad_handler || true

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report-api${{ matrix.api-level }}
          path: |
            android/app/build/reports/androidTests/connected/
            android/phototok/build/reports/androidTests/connected/
          if-no-files-found: ignore

  # ── Build & sign (main / tags / manual dispatch only) ───────────
  build:
    name: Build Android
    needs: [unit-tests, instrumented-tests, detect-changes]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    env:
      VERSION_CODE_OFFSET: ${{ vars.VERSION_CODE_OFFSET || 0 }}
      TOOLBOX_VERSION_CODE_OFFSET: ${{ vars.TOOLBOX_VERSION_CODE_OFFSET || 0 }}
      PHOTOTOK_VERSION_CODE_OFFSET: ${{ vars.PHOTOTOK_VERSION_CODE_OFFSET || 0 }}

    steps:
      # Re-running a failed workflow reuses github.run_number, so a plain
      # run_number version code collides on Google Play when an earlier attempt
      # already published ("Version code N has already been used"). Folding in
      # run_attempt makes every attempt unique while staying monotonically
      # increasing across runs (run 78 attempt 1 → 7801, attempt 2 → 7802,
      # run 79 attempt 1 → 7901). Play only requires codes to increase.
      - name: Compute version code
        run: echo "VERSION_CODE=$(( 10000 + ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # Each app has its own upload keystore (full isolation). Decode both.
      - name: Decode Keystores
        if: github.event_name == 'push'
        env:
          TOOLBOX_KEYSTORE_BASE64: ${{ secrets.TOOLBOX_KEYSTORE_FILE }}
          PHOTOTOK_KEYSTORE_BASE64: ${{ secrets.PHOTOTOK_KEYSTORE_FILE }}
        run: |
          if [ -n "$TOOLBOX_KEYSTORE_BASE64" ]; then
            printf "%s" "$TOOLBOX_KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/android/toolbox-upload.jks
            echo "TOOLBOX_KEYSTORE_FILE=${{ github.workspace }}/android/toolbox-upload.jks" >> "$GITHUB_ENV"
          else
            echo "Toolbox keystore secret is empty; :app release will be unsigned."
          fi
          if [ -n "$PHOTOTOK_KEYSTORE_BASE64" ]; then
            printf "%s" "$PHOTOTOK_KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/android/phototok-upload.jks
            echo "PHOTOTOK_KEYSTORE_FILE=${{ github.workspace }}/android/phototok-upload.jks" >> "$GITHUB_ENV"
          else
            echo "Photo Tok keystore secret is empty; :phototok release will be unsigned."
          fi

      - name: Build release APK
        if: github.event_name == 'push'
        working-directory: android
        run: |
          TASKS=""
          if [ "${{ needs.detect-changes.outputs.toolbox }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TASKS="$TASKS :app:assembleRelease"
          fi
          if [ "${{ needs.detect-changes.outputs.phototok }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TASKS="$TASKS :phototok:assembleRelease"
          fi
          if [ -n "$TASKS" ]; then
            ./gradlew $TASKS
          else
            echo "No module changes detected; skipping release APK builds."
          fi
        env:
          TOOLBOX_KEY_ALIAS: ${{ secrets.TOOLBOX_KEY_ALIAS }}
          TOOLBOX_KEY_PASSWORD: ${{ secrets.TOOLBOX_KEY_PASSWORD }}
          TOOLBOX_STORE_PASSWORD: ${{ secrets.TOOLBOX_STORE_PASSWORD }}
          PHOTOTOK_KEY_ALIAS: ${{ secrets.PHOTOTOK_KEY_ALIAS }}
          PHOTOTOK_KEY_PASSWORD: ${{ secrets.PHOTOTOK_KEY_PASSWORD }}
          PHOTOTOK_STORE_PASSWORD: ${{ secrets.PHOTOTOK_STORE_PASSWORD }}

      - name: Build release AAB
        if: github.event_name == 'push'
        working-directory: android
        run: |
          TASKS=""
          if [ "${{ needs.detect-changes.outputs.toolbox }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TASKS="$TASKS :app:bundleRelease"
          fi
          if [ "${{ needs.detect-changes.outputs.phototok }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TASKS="$TASKS :phototok:bundleRelease"
          fi
          if [ -n "$TASKS" ]; then
            ./gradlew $TASKS
          else
            echo "No module changes detected; skipping release AAB builds."
          fi
        env:
          TOOLBOX_KEY_ALIAS: ${{ secrets.TOOLBOX_KEY_ALIAS }}
          TOOLBOX_KEY_PASSWORD: ${{ secrets.TOOLBOX_KEY_PASSWORD }}
          TOOLBOX_STORE_PASSWORD: ${{ secrets.TOOLBOX_STORE_PASSWORD }}
          PHOTOTOK_KEY_ALIAS: ${{ secrets.PHOTOTOK_KEY_ALIAS }}
          PHOTOTOK_KEY_PASSWORD: ${{ secrets.PHOTOTOK_KEY_PASSWORD }}
          PHOTOTOK_STORE_PASSWORD: ${{ secrets.PHOTOTOK_STORE_PASSWORD }}

      - name: Prepare Release Assets
        if: github.event_name == 'push'
        run: |
          mkdir -p android/release-assets
          if compgen -G "android/app/build/outputs/apk/release/*.apk" > /dev/null; then
            cp android/app/build/outputs/apk/release/*.apk android/release-assets/photo-selector-toolbox-android-release.apk
          fi
          if compgen -G "android/app/build/outputs/bundle/release/*.aab" > /dev/null; then
            cp android/app/build/outputs/bundle/release/*.aab android/release-assets/photo-selector-toolbox-android-release.aab
          fi
          if compgen -G "android/phototok/build/outputs/apk/release/*.apk" > /dev/null; then
            cp android/phototok/build/outputs/apk/release/*.apk android/release-assets/phototok-android-release.apk
          fi
          if compgen -G "android/phototok/build/outputs/bundle/release/*.aab" > /dev/null; then
            cp android/phototok/build/outputs/bundle/release/*.aab android/release-assets/phototok-android-release.aab
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-selector-toolbox-android-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: github.event_name == 'push' && (needs.detect-changes.outputs.toolbox == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: photo-selector-toolbox-android-release
          path: android/release-assets/photo-selector-toolbox-android-release.apk

      - name: Upload Phototok release APK
        if: github.event_name == 'push' && (needs.detect-changes.outputs.phototok == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: phototok-android-release
          path: android/release-assets/phototok-android-release.apk

      # Each app lives in its own Firebase project with its own service-account credential.
      - name: Upload Photo Selector Toolbox to Firebase App Distribution
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.detect-changes.outputs.toolbox == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
        # Tester distribution is a convenience and must not block the Play Store
        # release that runs later in this job. The "groups" alias below must exist
        # in the Firebase project, otherwise distribution 404s.
        continue-on-error: true
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          # App ID from the Photo Selector Toolbox Firebase project (photo-selector-tb-dist).
          appId: ${{ vars.TOOLBOX_FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.TOOLBOX_FIREBASE_APP_DISTRIBUTION_CREDENTIALS }}
          # Must match a tester-group ALIAS created in the Firebase Console
          # (App Distribution > Testers & groups). Override via repo variable.
          groups: ${{ vars.TOOLBOX_FIREBASE_TESTER_GROUP || 'testers' }}
          file: android/release-assets/photo-selector-toolbox-android-release.apk

      - name: Upload Photo Tok to Firebase App Distribution
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.detect-changes.outputs.phototok == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
        continue-on-error: true
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          # TODO: replace with the App ID from the NEW Photo Tok Firebase project.
          appId: ${{ vars.PHOTOTOK_FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.PHOTOTOK_FIREBASE_APP_DISTRIBUTION_CREDENTIALS }}
          # Must match a tester-group ALIAS created in the Firebase Console.
          groups: ${{ vars.PHOTOTOK_FIREBASE_TESTER_GROUP || 'testers' }}
          file: android/release-assets/phototok-android-release.apk

      - name: Upload release AAB
        if: github.event_name == 'push' && (needs.detect-changes.outputs.toolbox == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: photo-selector-toolbox-android-release-aab
          path: android/release-assets/photo-selector-toolbox-android-release.aab

      - name: Upload Phototok release AAB
        if: github.event_name == 'push' && (needs.detect-changes.outputs.phototok == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: phototok-android-release-aab
          path: android/release-assets/phototok-android-release.aab

      - name: Publish Release Assets
        if: github.event_name == 'push' && (needs.detect-changes.outputs.toolbox == 'true' || needs.detect-changes.outputs.phototok == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || 'Nightly Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: android/release-assets/*

  publish-play:
    name: Publish to Google Play
    needs: [build, detect-changes]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && (needs.detect-changes.outputs.toolbox == 'true' || needs.detect-changes.outputs.phototok == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest

    steps:
      - name: Download Photo Selector Toolbox AAB
        if: needs.detect-changes.outputs.toolbox == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/download-artifact@v4
        with:
          name: photo-selector-toolbox-android-release-aab
          path: release-assets

      - name: Download Photo Tok AAB
        if: needs.detect-changes.outputs.phototok == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/download-artifact@v4
        with:
          name: phototok-android-release-aab
          path: release-assets

      - name: Upload Photo Selector Toolbox AAB to Google Play
        if: needs.detect-changes.outputs.toolbox == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.TOOLBOX_GP_SERVICE_ACCOUNT_JSON }}
          packageName: com.photoselectortoolbox
          releaseFiles: release-assets/photo-selector-toolbox-android-release.aab
          tracks: internal
          status: completed

      - name: Upload Photo Tok AAB to Google Play
        if: needs.detect-changes.outputs.phototok == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PHOTOTOK_GP_SERVICE_ACCOUNT_JSON }}
          packageName: com.phototok
          releaseFiles: release-assets/phototok-android-release.aab
          tracks: internal
          status: completed
