name: Python Tests

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.flake8'
      - '.github/workflows/test-python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.flake8'
      - '.github/workflows/test-python.yml'
  workflow_dispatch:

concurrency:
  group: test-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast lint gate (< 30s) ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 src/ tests/ --count --show-source --statistics

  # ── Unit & integration tests ────────────────────────────────────
  test:
    name: Tests on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            architecture: x64
          - os: macos-latest
            python-version: "3.12"
            architecture: arm64
          - os: windows-latest
            python-version: "3.12"
            architecture: x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libcairo2-dev xvfb scrot

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Start Xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1

      - name: Run tests (excluding visual)
        run: >-
          poetry run pytest
          --tb=short -q
          --junitxml=test-results.xml
          --cov=photo_selector_toolbox
          --cov-report=xml
          --cov-fail-under=60
          -m "not visual"
        env:
          DISPLAY: ${{ runner.os == 'Linux' && ':99' || '' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results.xml
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml
          if-no-files-found: ignore

  # ── Visual regression tests (Linux only, real Xvfb rendering) ───
  visual:
    name: Visual regression tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libcairo2-dev xvfb scrot

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-3.12-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-3.12-

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1

      - name: Run visual tests
        run: >-
          poetry run pytest
          tests/visual/
          --tb=short -q
          -m visual
        env:
          DISPLAY: ':99'

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-diffs
          path: tests/visual/diffs/
          if-no-files-found: ignore
