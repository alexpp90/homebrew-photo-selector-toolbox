name: Android Tests

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'android/**'
      - '.github/workflows/test-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/test-android.yml'
  workflow_dispatch:

concurrency:
  group: test-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JVM unit tests (no emulator needed) ─────────────────────────
  unit-tests:
    name: Unit tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

  # ── Instrumented tests on Android emulator ──────────────────────
  instrumented-tests:
    name: Instrumented tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [30]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create AVD and generate snapshot
        uses: reactivecircus/android-emulator-runner@v2
        env:
          # Give the emulator longer to shut down gracefully before it is killed.
          # Works around the "stop: Not implemented" hang on snapshot save.
          # https://github.com/ReactiveCircus/android-emulator-runner/issues/385
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 60
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics -camera-back none
          disable-animations: true
          script: |
            echo "AVD snapshot generated"
            # crashpad_handler can outlive the emulator and block shutdown,
            # causing "stop: Not implemented" + adb exit code 1. Reap it.
            killall -INT crashpad_handler || true

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 60
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          # -no-snapshot-save: snapshot is already cached, so skip the save on
          # teardown that triggers the shutdown hang.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics -camera-back none
          disable-animations: true
          working-directory: android
          script: |
            ./gradlew :app:connectedDebugAndroidTest :phototok:connectedDebugAndroidTest --stacktrace
            killall -INT crashpad_handler || true

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report-api${{ matrix.api-level }}
          path: android/app/build/reports/androidTests/connected/
          if-no-files-found: ignore
