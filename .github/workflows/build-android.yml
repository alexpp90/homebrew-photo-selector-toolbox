name: Android Build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Gate: wait for Android tests ────────────────────────────────
  preflight:
    name: Wait for Android tests
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Android test workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-regexp: 'Unit tests .+'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success,skipped

  build:
    name: Build Android
    needs: preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # Each app has its own upload keystore (full isolation). Decode both.
      - name: Decode Keystores
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        env:
          TOOLBOX_KEYSTORE_BASE64: ${{ secrets.TOOLBOX_KEYSTORE_FILE }}
          PHOTOTOK_KEYSTORE_BASE64: ${{ secrets.PHOTOTOK_KEYSTORE_FILE }}
        run: |
          if [ -n "$TOOLBOX_KEYSTORE_BASE64" ]; then
            printf "%s" "$TOOLBOX_KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/android/toolbox-upload.jks
            echo "TOOLBOX_KEYSTORE_FILE=${{ github.workspace }}/android/toolbox-upload.jks" >> "$GITHUB_ENV"
          else
            echo "Toolbox keystore secret is empty; :app release will be unsigned."
          fi
          if [ -n "$PHOTOTOK_KEYSTORE_BASE64" ]; then
            printf "%s" "$PHOTOTOK_KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/android/phototok-upload.jks
            echo "PHOTOTOK_KEYSTORE_FILE=${{ github.workspace }}/android/phototok-upload.jks" >> "$GITHUB_ENV"
          else
            echo "Photo Tok keystore secret is empty; :phototok release will be unsigned."
          fi

      - name: Build release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          TOOLBOX_KEY_ALIAS: ${{ secrets.TOOLBOX_KEY_ALIAS }}
          TOOLBOX_KEY_PASSWORD: ${{ secrets.TOOLBOX_KEY_PASSWORD }}
          TOOLBOX_STORE_PASSWORD: ${{ secrets.TOOLBOX_STORE_PASSWORD }}
          PHOTOTOK_KEY_ALIAS: ${{ secrets.PHOTOTOK_KEY_ALIAS }}
          PHOTOTOK_KEY_PASSWORD: ${{ secrets.PHOTOTOK_KEY_PASSWORD }}
          PHOTOTOK_STORE_PASSWORD: ${{ secrets.PHOTOTOK_STORE_PASSWORD }}

      - name: Build release AAB
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        working-directory: android
        run: ./gradlew bundleRelease
        env:
          TOOLBOX_KEY_ALIAS: ${{ secrets.TOOLBOX_KEY_ALIAS }}
          TOOLBOX_KEY_PASSWORD: ${{ secrets.TOOLBOX_KEY_PASSWORD }}
          TOOLBOX_STORE_PASSWORD: ${{ secrets.TOOLBOX_STORE_PASSWORD }}
          PHOTOTOK_KEY_ALIAS: ${{ secrets.PHOTOTOK_KEY_ALIAS }}
          PHOTOTOK_KEY_PASSWORD: ${{ secrets.PHOTOTOK_KEY_PASSWORD }}
          PHOTOTOK_STORE_PASSWORD: ${{ secrets.PHOTOTOK_STORE_PASSWORD }}

      - name: Prepare Release Assets
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          mkdir -p android/release-assets
          cp android/app/build/outputs/apk/release/*.apk android/release-assets/photo-selector-toolbox-android-release.apk
          cp android/app/build/outputs/bundle/release/*.aab android/release-assets/photo-selector-toolbox-android-release.aab
          cp android/phototok/build/outputs/apk/release/*.apk android/release-assets/phototok-android-release.apk
          cp android/phototok/build/outputs/bundle/release/*.aab android/release-assets/phototok-android-release.aab

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-selector-toolbox-android-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: photo-selector-toolbox-android-release
          path: android/release-assets/photo-selector-toolbox-android-release.apk

      - name: Upload Phototok release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: phototok-android-release
          path: android/release-assets/phototok-android-release.apk

      # Each app lives in its own Firebase project with its own service-account credential.
      - name: Upload Photo Selector Toolbox to Firebase App Distribution
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Tester distribution is a convenience and must not block the Play Store
        # release that runs later in this job. The "groups" alias below must exist
        # in the Firebase project, otherwise distribution 404s.
        continue-on-error: true
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          # App ID from the Photo Selector Toolbox Firebase project (photo-selector-tb-dist).
          appId: ${{ vars.TOOLBOX_FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.TOOLBOX_FIREBASE_APP_DISTRIBUTION_CREDENTIALS }}
          # Must match a tester-group ALIAS created in the Firebase Console
          # (App Distribution > Testers & groups). Override via repo variable.
          groups: ${{ vars.TOOLBOX_FIREBASE_TESTER_GROUP || 'testers' }}
          file: android/release-assets/photo-selector-toolbox-android-release.apk

      - name: Upload Photo Tok to Firebase App Distribution
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          # TODO: replace with the App ID from the NEW Photo Tok Firebase project.
          appId: ${{ vars.PHOTOTOK_FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.PHOTOTOK_FIREBASE_APP_DISTRIBUTION_CREDENTIALS }}
          # Must match a tester-group ALIAS created in the Firebase Console.
          groups: ${{ vars.PHOTOTOK_FIREBASE_TESTER_GROUP || 'testers' }}
          file: android/release-assets/phototok-android-release.apk

      - name: Upload release AAB
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: photo-selector-toolbox-android-release-aab
          path: android/release-assets/photo-selector-toolbox-android-release.aab

      - name: Upload Phototok release AAB
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: phototok-android-release-aab
          path: android/release-assets/phototok-android-release.aab

      - name: Publish Release Assets
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || 'Nightly Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: android/release-assets/*

      # Each app has its own Play publishing service account (from its own GCP project).
      - name: Upload Photo Selector Toolbox AAB to Google Play
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.TOOLBOX_GP_SERVICE_ACCOUNT_JSON }}
          packageName: com.photoselectortoolbox
          releaseFiles: android/release-assets/photo-selector-toolbox-android-release.aab
          track: internal
          status: completed

      - name: Upload Photo Tok AAB to Google Play
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PHOTOTOK_GP_SERVICE_ACCOUNT_JSON }}
          packageName: com.phototok
          releaseFiles: android/release-assets/phototok-android-release.aab
          track: internal
          status: completed

